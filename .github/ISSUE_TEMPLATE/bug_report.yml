name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: dropdown
    id: crate
    attributes:
      label: Affected crate
      options:
        - mikrotik-rs
        - mikrotik-proto
        - mikrotik-tokio
        - mikrotik-embassy
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Crate version
      description: Output of `cargo tree -p mikrotik-rs` or the version in your `Cargo.toml`
      placeholder: "0.7.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: rust
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide the following info:
      value: |
        - Rust version (`rustc --version`):
        - OS:
        - RouterOS version:
        - Router model:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any error messages, panics, or log output.
      render: text
    validations:
      required: false
