name: PR Cargo Preflight Checks

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
    fmt:
        name: 📐 Format
        runs-on: ubuntu-latest
        steps:
            - name: 🛒 Checkout
              uses: actions/checkout@v6

            - name: 📐 Rustfmt
              run: cargo fmt --all -- --check

    clippy:
        name: 📎 Clippy
        runs-on: ubuntu-latest
        steps:
            - name: 🛒 Checkout
              uses: actions/checkout@v6

            - name: 📎 Clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

    build:
        name: 🔨 Build
        runs-on: ubuntu-latest
        steps:
            - name: 🛒 Checkout
              uses: actions/checkout@v6

            - name: 🔨 Build
              run: cargo build --workspace

    test:
        name: 🧪 Test
        runs-on: ubuntu-latest
        steps:
            - name: 🛒 Checkout
              uses: actions/checkout@v6

            - name: 🧪 Test (default features)
              run: cargo test --workspace

    test-features:
        name: 🧪 Feature combinations
        runs-on: ubuntu-latest
        steps:
            - name: 🛒 Checkout
              uses: actions/checkout@v6

            - name: 📦 Install cargo-hack
              uses: taiki-e/install-action@cargo-hack

            - name: 🔍 Check each feature independently
              run: cargo hack check --each-feature --no-dev-deps --workspace --ignore-private

            - name: 🔍 Check feature powerset (facade)
              run: cargo hack check --feature-powerset --depth 2 --no-dev-deps -p mikrotik-rs

            - name: 🧪 Test no_std path
              run: cargo test -p mikrotik-proto --no-default-features

    doc:
        name: 📖 Doc
        runs-on: ubuntu-latest
        env:
            RUSTDOCFLAGS: -D warnings
        steps:
            - name: 🛒 Checkout
              uses: actions/checkout@v6

            - name: 📖 Doc
              run: cargo doc --workspace --no-deps
